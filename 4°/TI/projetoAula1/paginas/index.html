<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }

        h1 {
            color: #333;
        }

        .menu {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
            width: 300px;
        }

        a {
            display: block;
            margin: 10px 0;
            text-decoration: none;
            background: #007BFF;
            color: white;
            padding: 10px;
            border-radius: 5px;
        }

        a:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Bem-vindo ao Sistema</h1> 
    <div class="menu">
        <h3>Menu</h3>
        <a href="/veiculos">Lista de Veículos</a>
        <a href="/sobre">Sobre</a>
    </div>
</body>
</html>
